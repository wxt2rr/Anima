<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SVG Preview</title>
  <style>
    body { margin: 0; font-family: Arial, sans-serif; background: #f8fafc; color: #0f172a; }
    .wrap { max-width: 1100px; margin: 32px auto; padding: 0 20px; }
    .card { background: white; border: 1px solid #e2e8f0; border-radius: 20px; padding: 20px; box-shadow: 0 16px 50px rgba(15,23,42,.08); }
    iframe { width: 100%; height: 720px; border: 0; background: white; border-radius: 16px; }
    pre { white-space: pre-wrap; background: #0f172a; color: #e2e8f0; padding: 16px; border-radius: 12px; overflow: auto; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>SVG Preview</h1>
    <div class="card">
      <iframe src="output.svg"></iframe>
    </div>
  </div>
</body>
</html>
